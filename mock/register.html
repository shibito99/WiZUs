<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — WiZUs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

<div class="auth-wrapper bg-gray-50">
  <div class="w-full max-w-sm">
    <h1 class="text-center text-4xl font-extrabold mb-8" style="color:#1d9bf0">WiZUs</h1>

    <div class="card p-8 shadow-sm">
      <h2 class="text-xl font-bold mb-6">アカウント作成</h2>

      <div id="error-banner" class="error-msg mb-4 hidden"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ユーザー名 <span class="text-gray-400 font-normal">(2〜50文字)</span></label>
          <input id="username" type="text" placeholder="例: john_doe" maxlength="50"
            class="form-input w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm">
          <p id="username-err" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="form-input w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm">
          <p id="email-err" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">パスワード <span class="text-gray-400 font-normal">(8文字以上)</span></label>
          <input id="password" type="password" placeholder="8文字以上"
            class="form-input w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm">
          <p id="password-err" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>
        <button onclick="register()" class="btn-primary w-full py-2.5 text-sm mt-2">登録する</button>
      </div>

      <p class="mt-6 text-center text-sm text-gray-500">
        すでにアカウントをお持ちの方は
        <a href="login.html" class="font-semibold hover:underline" style="color:#1d9bf0">ログイン</a>
      </p>
    </div>
  </div>
</div>

<script>
  const AVATAR_COLORS = ['#1d9bf0','#f4212e','#00ba7c','#ff7700','#794bc4','#ffad1f','#17bf63'];

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.toggle('hidden', !msg);
  }

  function register() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const banner = document.getElementById('error-banner');
    banner.classList.add('hidden');

    let valid = true;
    showErr('username-err', '');
    showErr('email-err', '');
    showErr('password-err', '');

    if (username.length < 2) { showErr('username-err', 'ユーザー名は2文字以上で入力してください。'); valid = false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('email-err', '有効なメールアドレスを入力してください。'); valid = false; }
    if (password.length < 8) { showErr('password-err', 'パスワードは8文字以上で入力してください。'); valid = false; }
    if (!valid) return;

    const users = getUsers();
    if (users.find(u => u.username === username)) { showErr('username-err', 'このユーザー名は既に使用されています。'); return; }
    if (users.find(u => u.email === email)) { showErr('email-err', 'このメールアドレスは既に登録されています。'); return; }

    const newUser = {
      id: nextId('wizus_next_user_id'),
      username,
      email,
      password,
      bio: '',
      avatar_color: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
      avatar_url: null,
      created_at: new Date().toISOString(),
    };
    users.push(newUser);
    saveUsers(users);

    banner.textContent = '登録が完了しました！ログインページに移動します...';
    banner.className = 'mb-4 bg-green-50 border border-green-200 text-green-700 rounded-xl px-3 py-2 text-sm';
    banner.classList.remove('hidden');
    setTimeout(() => window.location.href = 'login.html', 1200);
  }
</script>
</body>
</html>
