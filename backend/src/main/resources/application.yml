spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sns_db?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough}
  expiration: 86400000  # 24 hours in ms

aws:
  s3:
    bucket-name: ${S3_BUCKET_NAME:sns-app-images}
    region: ${AWS_REGION:ap-northeast-1}

logging:
  level:
    com.sns: DEBUG
